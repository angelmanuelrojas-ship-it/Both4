<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT 4H — Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg:#080b10; --surface:#0d1117; --surface2:#111820;
    --border:#1a2235; --border2:#222e45;
    --text:#a8b8cc; --text2:#d4e0f0; --muted:#384556;
    --buy:#05d68c; --buy-dim:rgba(5,214,140,.10); --buy-ring:rgba(5,214,140,.28);
    --sell:#f03d5f; --sell-dim:rgba(240,61,95,.10); --sell-ring:rgba(240,61,95,.28);
    --neutral:#f5a623; --accent:#4d8bff; --accent2:#2562e8;
    --mono:'IBM Plex Mono','JetBrains Mono','Fira Code',monospace;
    --sans:'Inter',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh;line-height:1.5}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--surface)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

  header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100}
  .logo{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:.12em;color:#fff;display:flex;align-items:center;gap:10px}
  .logo-badge{background:var(--accent2);color:#fff;font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;letter-spacing:.1em}
  .hright{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--muted);font-family:var(--mono)}
  .status-group{display:flex;align-items:center;gap:7px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
  .dot.live{background:var(--buy);box-shadow:0 0 0 3px var(--buy-ring);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 3px var(--buy-ring)}50%{opacity:.6;box-shadow:0 0 0 5px transparent}}
  #stxt{color:var(--text);font-size:11px}
  #lscan{color:var(--muted);font-size:10px}
  #scan-btn{background:var(--accent);color:#fff;border:none;padding:0 16px;height:32px;border-radius:6px;font-size:11px;font-weight:600;font-family:var(--mono);cursor:pointer;transition:background .15s}
  #scan-btn:hover{background:#5f9bff}
  #scan-btn:disabled{opacity:.35;cursor:not-allowed}

  .info-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 20px;font-size:10px;color:var(--muted);font-family:var(--mono)}
  .info-bar strong{color:var(--text2)}
  .info-bar .sep{color:var(--border2);margin:0 8px}

  .main{padding:18px 20px;max-width:1280px}

  .err-banner{background:var(--sell-dim);border:1px solid var(--sell-ring);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:var(--sell);font-family:var(--mono);display:none}

  .summary{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 18px;min-width:110px;position:relative;overflow:hidden}
  .sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border2)}
  .sc.buy-card::before{background:var(--buy)}
  .sc.sell-card::before{background:var(--sell)}
  .sc .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px;font-family:var(--mono)}
  .sc .v{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text2)}
  .sc .v.b{color:var(--buy)}.sc .v.s{color:var(--sell)}

  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .gh{display:grid;grid-template-columns:70px 100px 64px 68px 110px 50px 50px 76px 120px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.12em;background:var(--surface2)}
  .row{display:grid;grid-template-columns:70px 100px 64px 68px 110px 50px 50px 76px 120px;padding:11px 14px;border-bottom:1px solid var(--border);align-items:center;transition:background .12s;border-left:3px solid transparent}
  .row:last-child{border-bottom:none}
  .row:hover{background:rgba(77,139,255,.04)}
  .row.sb{border-left-color:var(--buy);background:linear-gradient(90deg,rgba(5,214,140,.04) 0%,transparent 50%)}
  .row.ss{border-left-color:var(--sell);background:linear-gradient(90deg,rgba(240,61,95,.04) 0%,transparent 50%)}
  .pair{font-family:var(--mono);font-weight:700;font-size:13px;color:#fff;letter-spacing:.04em}
  .price{font-family:var(--mono);font-size:11px;color:var(--text2)}
  .trend-bull{color:var(--buy);font-size:10px;font-family:var(--mono);font-weight:600}
  .trend-bear{color:var(--sell);font-size:10px;font-family:var(--mono);font-weight:600}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:.07em}
  .badge.b{background:var(--buy-dim);color:var(--buy);border:1px solid var(--buy-ring)}
  .badge.s{background:var(--sell-dim);color:var(--sell);border:1px solid var(--sell-ring)}
  .badge.w{background:transparent;color:var(--muted);border:1px solid var(--border2)}
  .val{font-family:var(--mono);font-size:11px}
  .ok{color:var(--buy)}.warn{color:var(--sell)}.neu{color:var(--text)}
  .tp{font-family:var(--mono);font-size:10px;line-height:1.8;margin-top:4px}
  .tp .t1{color:var(--neutral)}.tp .t2{color:var(--buy)}.tp .sl{color:var(--sell)}
  .dots{display:flex;gap:4px;align-items:center}
  .d{width:8px;height:8px;border-radius:2px;background:var(--border2);transition:background .2s}
  .d.mb{background:var(--buy)}.d.ms{background:var(--sell)}
  .ecell{color:var(--sell);font-family:var(--mono);font-size:10px;grid-column:2/10}

  .loading{text-align:center;padding:52px 20px;color:var(--muted);font-family:var(--mono);font-size:12px}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:9px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  .log-panel{margin-top:18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .lh{padding:9px 14px;border-bottom:1px solid var(--border);font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-family:var(--mono);display:flex;justify-content:space-between;background:var(--surface2)}
  .lh button{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;transition:color .15s}
  .lh button:hover{color:var(--text)}
  #log{height:120px;overflow-y:auto;padding:10px 14px;font-family:var(--mono);font-size:11px;line-height:1.9;color:var(--muted)}
  #log .i{color:var(--text)}#log .b{color:var(--buy)}#log .s{color:var(--sell)}#log .w{color:var(--neutral)}
  #log .ts{color:var(--border2);margin-right:10px;user-select:none}

  @media(max-width:900px){
    .gh,.row{grid-template-columns:64px 90px 60px 64px 95px 44px 44px 66px 108px}
    .main{padding:14px 12px}
    header{padding:0 12px}
    .info-bar{display:none}
  }
</style>
</head>
<body>

<header>
  <div class="logo">BOT4H <span class="logo-badge">4H</span></div>
  <div class="hright">
    <div class="status-group">
      <span class="dot" id="sdot"></span>
      <span id="stxt">Listo</span>
    </div>
    <span id="lscan"></span>
    <button id="scan-btn" onclick="runScan()">▶ Escanear</button>
  </div>
</header>

<div class="info-bar">
  Fuente <strong>Kraken via allorigins.win</strong>
  <span class="sep">|</span>
  Proxy CORS · funciona en iOS/Safari · sin API key
  <span class="sep">|</span>
  Velas 4H
</div>

<div class="main">
  <div id="err-banner" class="err-banner"></div>

  <div class="summary">
    <div class="sc buy-card"><div class="l">Señales BUY</div><div class="v b" id="cb">—</div></div>
    <div class="sc sell-card"><div class="l">Señales SELL</div><div class="v s" id="cs">—</div></div>
    <div class="sc"><div class="l">Pares OK</div><div class="v" id="ct">—</div></div>
    <div class="sc"><div class="l">Filtros activos</div><div class="v" id="cf">—</div></div>
  </div>

  <div class="table-wrap">
    <div class="gh">
      <div>Par</div><div>Precio</div><div>Tend.</div>
      <div>RSI(14)</div><div>Stoch K/D</div>
      <div>Vol</div><div>ATR</div><div>Conds</div><div>Señal / TP</div>
    </div>
    <div id="results">
      <div class="loading">Presiona <strong style="color:#fff">Escanear</strong> para analizar los 10 pares en 4H</div>
    </div>
  </div>

  <div class="log-panel">
    <div class="lh">
      <span>Log del sistema</span>
      <button onclick="document.getElementById('log').innerHTML=''">Limpiar</button>
    </div>
    <div id="log"></div>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
// Usamos allorigins.win como proxy CORS para que funcione desde archivos
// locales (file://) en Safari iOS sin restricciones.
// Kraken devuelve velas de 4H con interval=240.

const KRAKEN_MAP = {
  BTC:  'XBTUSD',
  ETH:  'ETHUSD',
  SOL:  'SOLUSD',
  BNB:  'BNBUSD',
  SUI:  'SUIUSD',
  ADA:  'ADAUSD',
  XRP:  'XRPUSD',
  DOT:  'DOTUSD',
  LINK: 'LINKUSD',
  AVAX: 'AVAXUSD',
};
const PAIRS = Object.keys(KRAKEN_MAP);

// Proxy CORS público — envuelve cualquier URL y añade headers CORS
const PROXY = 'https://api.allorigins.win/raw?url=';
let scanning = false;

// ─── Utils ────────────────────────────────────────────────────────────────────
function log(msg,t='i'){
  const el=document.getElementById('log');
  const ts=new Date().toLocaleTimeString('es',{hour12:false});
  const s=document.createElement('span');
  s.className=t;
  s.innerHTML=`<span class="ts">[${ts}]</span>${msg}<br>`;
  el.appendChild(s);el.scrollTop=el.scrollHeight;
}
function setStatus(t,live=false){
  document.getElementById('stxt').textContent=t;
  document.getElementById('sdot').className='dot'+(live?' live':'');
}
function fmt(n,d=2){return n!=null?n.toFixed(d):'—';}
function fmtP(n){
  if(n==null)return'—';
  if(n>=10000)return n.toFixed(2);
  if(n>=100)  return n.toFixed(3);
  if(n>=1)    return n.toFixed(4);
  return n.toFixed(6);
}

// Fetch con timeout manual (compatible iOS/Safari)
function fetchT(url,ms=25000){
  return new Promise((res,rej)=>{
    const t=setTimeout(()=>rej(new Error('Timeout')),ms);
    fetch(url)
      .then(r=>{clearTimeout(t);res(r);})
      .catch(e=>{clearTimeout(t);rej(e);});
  });
}

async function fetchKraken(pair){
  const target=`https://api.kraken.com/0/public/OHLC?pair=${pair}&interval=240`;
  const url=PROXY+encodeURIComponent(target);
  const r=await fetchT(url);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const d=await r.json();
  if(d.error&&d.error.length) throw new Error(d.error[0]);
  const key=Object.keys(d.result).find(k=>k!=='last');
  if(!key) throw new Error('Sin datos');
  return d.result[key]; // [[time,o,h,l,c,vwap,vol,count],...]
}

// ─── Indicadores ──────────────────────────────────────────────────────────────
function ema(arr,p){
  const k=2/(p+1);
  let prev=arr.slice(0,p).reduce((a,b)=>a+b,0)/p;
  const out=new Array(p-1).fill(null);out.push(prev);
  for(let i=p;i<arr.length;i++){prev=arr[i]*k+prev*(1-k);out.push(prev);}
  return out;
}
function rsi(C,p=14){
  let g=0,l=0;
  const sl=C.slice(-(p+1));
  for(let i=1;i<sl.length;i++){const d=sl[i]-sl[i-1];if(d>0)g+=d;else l-=d;}
  g/=p;l/=p;
  if(l===0)return 100;
  return 100-100/(1+g/l);
}
function stoch(H,L,C,kp=14,dp=3){
  const rK=[];
  for(let i=kp-1;i<C.length;i++){
    const hh=Math.max(...H.slice(i-kp+1,i+1));
    const ll=Math.min(...L.slice(i-kp+1,i+1));
    rK.push(hh===ll?50:(C[i]-ll)/(hh-ll)*100);
  }
  const sK=[],sD=[];
  for(let i=dp-1;i<rK.length;i++) sK.push(rK.slice(i-dp+1,i+1).reduce((a,b)=>a+b,0)/dp);
  for(let i=dp-1;i<sK.length;i++) sD.push(sK.slice(i-dp+1,i+1).reduce((a,b)=>a+b,0)/dp);
  const n=sK.length,m=sD.length;
  return{K:sK[n-1],Kp:sK[n-2],D:sD[m-1],Dp:sD[m-2]};
}
function atrSeries(H,L,C,p=14){
  const tr=[];
  for(let i=1;i<C.length;i++)
    tr.push(Math.max(H[i]-L[i],Math.abs(H[i]-C[i-1]),Math.abs(L[i]-C[i-1])));
  const out=[];
  for(let i=p-1;i<tr.length;i++)
    out.push(tr.slice(i-p+1,i+1).reduce((a,b)=>a+b,0)/p);
  return out;
}
function findSR(H,L,maxD=0.012,minT=3){
  const pts=[...H,...L],used=new Set(),zones=[];
  for(let i=0;i<pts.length;i++){
    if(used.has(i))continue;
    const base=pts[i],gr=[base],idx=[i];
    for(let j=i+1;j<pts.length;j++){
      if(!used.has(j)&&Math.abs(pts[j]-base)/base<=maxD){gr.push(pts[j]);idx.push(j);}
    }
    if(gr.length>=minT){
      zones.push({price:gr.reduce((a,b)=>a+b,0)/gr.length,touches:gr.length});
      idx.forEach(x=>used.add(x));
    }
  }
  return zones;
}
function wick(o,h,l,c,type){
  const body=Math.abs(c-o);
  if(!body)return false;
  return type==='buy'?(Math.min(o,c)-l)>=2*body:(h-Math.max(o,c))>=2*body;
}

// ─── Análisis ────────────────────────────────────────────────────────────────
async function analyze(sym){
  const kl=await fetchKraken(KRAKEN_MAP[sym]);
  const O=kl.map(k=>parseFloat(k[1]));
  const H=kl.map(k=>parseFloat(k[2]));
  const L=kl.map(k=>parseFloat(k[3]));
  const C=kl.map(k=>parseFloat(k[4]));
  const V=kl.map(k=>parseFloat(k[6]));
  const n=C.length;
  if(n<50) throw new Error('Datos insuficientes');

  const e50=ema(C,Math.min(50,n-1));
  const e200=ema(C,Math.min(200,n-1));
  const bull=e50[n-1]>e200[n-1];

  const r=rsi(C);
  const st=stoch(H.slice(-80),L.slice(-80),C.slice(-80));

  const atrA=atrSeries(H,L,C,14);
  const atrNow=atrA[atrA.length-1];
  const atrAvg=atrA.slice(-50).reduce((a,b)=>a+b,0)/Math.min(50,atrA.length);

  const vNow=V[n-1];
  const vAvg=V.slice(-21,-1).reduce((a,b)=>a+b,0)/20;
  const fV=vNow>vAvg*1.1;

  const h20=Math.max(...H.slice(-20)),l20=Math.min(...L.slice(-20));
  const rng=(h20-l20)/l20;
  const fA=atrNow>=atrAvg*0.75;
  const fR=rng>=0.04;

  const zones=findSR(H.slice(-Math.min(n,300)),L.slice(-Math.min(n,300)));
  const price=C[n-1];
  const zone=zones.find(z=>Math.abs(price-z.price)/price<=0.015);

  const wB=wick(O[n-1],H[n-1],L[n-1],C[n-1],'buy');
  const wS=wick(O[n-1],H[n-1],L[n-1],C[n-1],'sell');

  const xB=st.K>st.D&&st.Kp<=st.Dp&&st.K<25&&st.D<25;
  const xS=st.K<st.D&&st.Kp>=st.Dp&&st.K>75&&st.D>75;

  const cB=[bull,!!zone,r<38,xB,wB];
  const cS=[!bull,!!zone,r>62,xS,wS];
  const buyOk=cB.every(Boolean)&&fV&&fA&&fR;
  const sellOk=cS.every(Boolean)&&fV&&fA&&fR;

  let sl,tp1,tp2;
  const zp=zone?zone.price:price;
  if(buyOk){sl=zp-atrNow;const R=price-sl;tp1=price+1.5*R;tp2=price+3*R;}
  if(sellOk){sl=zp+atrNow;const R=sl-price;tp1=price-1.5*R;tp2=price-3*R;}

  return{sym,price,bull,rsi:r,st,atrNow,atrAvg,fV,fA,fR,
         zone,zones:zones.length,buyOk,sellOk,cB,cS,sl,tp1,tp2,
         filtersOk:fV&&fA&&fR};
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderRow(d){
  const sc=d.buyOk?'sb':d.sellOk?'ss':'sn';
  const trend=d.bull
    ?`<span class="trend-bull">▲ BULL</span>`
    :`<span class="trend-bear">▼ BEAR</span>`;
  const rCls=(d.rsi<38||d.rsi>62)?'ok':'neu';
  const sCls=(d.st.K<25||d.st.K>75)?'ok':'neu';
  const conds=d.buyOk?d.cB:d.cS;
  const ct=d.sellOk?'ms':'mb';
  const dots=conds.map(c=>`<div class="d ${c?ct:''}"></div>`).join('');
  let sig=`<span class="badge w">ESPERA</span>`,tp='';
  if(d.buyOk){
    sig=`<span class="badge b">▲ BUY</span>`;
    tp=`<div class="tp"><span class="t1">TP1 ${fmtP(d.tp1)}</span><br><span class="t2">TP2 ${fmtP(d.tp2)}</span><br><span class="sl">SL&nbsp;&nbsp;${fmtP(d.sl)}</span></div>`;
  }else if(d.sellOk){
    sig=`<span class="badge s">▼ SELL</span>`;
    tp=`<div class="tp"><span class="t1">TP1 ${fmtP(d.tp1)}</span><br><span class="t2">TP2 ${fmtP(d.tp2)}</span><br><span class="sl">SL&nbsp;&nbsp;${fmtP(d.sl)}</span></div>`;
  }
  return`<div class="row ${sc}">
    <div class="pair">${d.sym}</div>
    <div class="price">${fmtP(d.price)}</div>
    <div>${trend}</div>
    <div class="val ${rCls}">${fmt(d.rsi,1)}</div>
    <div class="val ${sCls}" style="font-size:10px;line-height:1.7">K:${fmt(d.st.K,1)}<br>D:${fmt(d.st.D,1)}</div>
    <div class="val ${d.fV?'ok':'warn'}">${d.fV?'✓':'✗'}</div>
    <div class="val ${d.fA&&d.fR?'ok':'warn'}">${d.fA&&d.fR?'✓':'✗'}</div>
    <div><div class="dots">${dots}</div></div>
    <div>${sig}${tp}</div>
  </div>`;
}

// ─── Scan ─────────────────────────────────────────────────────────────────────
async function runScan(){
  if(scanning)return;
  scanning=true;
  document.getElementById('err-banner').style.display='none';
  const btn=document.getElementById('scan-btn');
  btn.disabled=true;btn.textContent='⟳ Escaneando...';
  setStatus('Conectando…',true);
  document.getElementById('results').innerHTML=
    `<div class="loading"><span class="spin"></span>Descargando datos 4H…</div>`;

  let buys=0,sells=0,filtersOk=0,errors=0;
  const rows=[];

  for(const sym of PAIRS){
    try{
      log(`Analizando ${sym}…`);
      const d=await analyze(sym);
      if(d.filtersOk)filtersOk++;
      if(d.buyOk){buys++;log(`✔ BUY → ${sym}  TP1:${fmtP(d.tp1)}  TP2:${fmtP(d.tp2)}  SL:${fmtP(d.sl)}`,'b');}
      else if(d.sellOk){sells++;log(`✔ SELL → ${sym}  TP1:${fmtP(d.tp1)}  TP2:${fmtP(d.tp2)}  SL:${fmtP(d.sl)}`,'s');}
      rows.push({sig:d.buyOk||d.sellOk,html:renderRow(d)});
    }catch(e){
      errors++;
      log(`✗ ${sym}: ${e.message}`,'w');
      rows.push({sig:false,html:
        `<div class="row sn"><div class="pair">${sym}</div><div class="ecell">${e.message}</div></div>`});
    }
    await new Promise(r=>setTimeout(r,400));
  }

  rows.sort((a,b)=>b.sig-a.sig);
  document.getElementById('results').innerHTML=rows.map(r=>r.html).join('');
  document.getElementById('cb').textContent=buys;
  document.getElementById('cs').textContent=sells;
  document.getElementById('ct').textContent=(PAIRS.length-errors)+'/'+PAIRS.length;
  document.getElementById('cf').textContent=filtersOk;
  document.getElementById('lscan').textContent=
    `Último: ${new Date().toLocaleTimeString('es',{hour12:false})}`;

  if(errors===PAIRS.length){
    const b=document.getElementById('err-banner');
    b.style.display='block';
    b.textContent='✗ Error de conexión. Verifica tu internet e intenta de nuevo.';
  }

  setStatus('Listo',false);
  log(`Scan completo — BUY:${buys}  SELL:${sells}  Errores:${errors}`);
  btn.disabled=false;btn.textContent='▶ Escanear';
  scanning=false;
}
</script>
</body>
